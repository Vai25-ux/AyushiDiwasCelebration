<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✨ Ayushi Diwas ✨</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:Poppins,sans-serif;

background:
radial-gradient(circle at top,#ff2d95 0%,transparent 35%),
radial-gradient(circle at bottom,#7b2ff7 0%,transparent 35%),
linear-gradient(135deg,#090909,#160f24,#090909);

color:white;

overflow-x:hidden;

}

nav{

position:fixed;

top:0;

left:0;

width:100%;

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 8%;

background:rgba(0,0,0,.35);

backdrop-filter:blur(15px);

z-index:999;

}

.logo{

font-size:24px;

font-weight:700;

letter-spacing:2px;

color:#ff69b4;

}

nav ul{

display:flex;

list-style:none;

gap:25px;

}

nav a{

text-decoration:none;

color:white;

transition:.3s;

}

nav a:hover{

color:#ff69b4;

}

.hero{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:100px 20px;

text-align:center;

}

.hero-box{

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

padding:60px;

border-radius:30px;

border:1px solid rgba(255,255,255,.1);

max-width:900px;

box-shadow:0 20px 50px rgba(0,0,0,.4);

}

.hero h1{

font-family:"Playfair Display",serif;

font-size:90px;

color:#ff5ea8;

text-shadow:0 0 20px #ff5ea8;

margin-bottom:20px;

}

.hero p{

font-size:22px;

line-height:1.8;

margin-top:20px;

}

.btn{

display:inline-block;

margin-top:40px;

padding:18px 45px;

border-radius:50px;

background:linear-gradient(90deg,#ff4da6,#ff884d);

text-decoration:none;

color:white;

font-weight:bold;

transition:.3s;

}

.btn:hover{

transform:translateY(-5px);

}

section{

padding:100px 8%;

}

h2{

text-align:center;

font-size:48px;

margin-bottom:60px;

font-family:"Playfair Display",serif;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:30px;

}

.card{

background:rgba(255,255,255,.07);

padding:35px;

border-radius:25px;

text-align:center;

transition:.3s;

}

.card:hover{

transform:translateY(-10px);

}

.icon{

font-size:55px;

margin-bottom:15px;

}

.timer{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

}

.timer div{

background:rgba(255,255,255,.08);

padding:30px;

border-radius:20px;

text-align:center;

}

.timer span{

font-size:60px;

font-weight:700;

color:#ffd369;

}
